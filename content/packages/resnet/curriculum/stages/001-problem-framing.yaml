id: S001
node_id: N001
title: "Why is going deeper not enough?"
type: framing
difficulty: very_easy
estimated_time_minutes: 10
artifact_refs:
  - artifact/logic/problem.md
  - artifact/logic/claims.md#degradation
  - artifact/logic/claims.md#not-overfitting
source_refs:
  - artifact/logic/claims.md#degradation
  - artifact/logic/claims.md#not-overfitting
task:
  prompt_md: |
    A 2015-era engineer trains two convolutional networks on CIFAR-10 with
    the same optimizer, same data augmentation, and batch normalization in
    every block. The shallower network has 20 layers; the deeper network has
    56 layers, no skip connections.

    The deeper network's *training* error is higher than the shallower
    network's training error. After many epochs, both networks have stopped
    improving.

    In your own words, answer:

    1. Why is this surprising? Be specific about what naive intuition this
       result contradicts.
    2. Why is "the deeper network is overfitting" *not* a sufficient
       explanation here?
    3. State the failure mode in one sentence using the term "degradation".

    Write 4–8 sentences total. Do not consult the answer; the rubric grades
    framing quality, not vocabulary recall.
inputs:
  mode: free_text
  expected_length:
    min_words: 60
    max_words: 220
