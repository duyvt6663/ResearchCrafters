feedback:
  canonical_md: |
    The surprising part is that adding capacity should never *hurt* training
    error: a deeper network can always represent the shallower one by setting
    extra layers to identity. So the deeper plain network is failing to find
    a function its capacity allows. This is not overfitting because training
    error itself is worse, not just test error. The phenomenon is the
    "degradation problem": deeper plain stacks become harder for the
    optimizer to fit, even with batch normalization controlling signal scale.
  common_misconceptions:
    - "\"It's just overfitting.\" Training error is worse, so capacity is not the bottleneck."
    - "\"Vanishing gradients explain it.\" Batch normalization keeps gradient variance non-trivial; the failure is optimization-difficulty at depth, not signal scale."
    - "\"Deeper is always worse.\" False — the residual variant at the same depth trains better than the shallow one. The plain stack is the issue."
