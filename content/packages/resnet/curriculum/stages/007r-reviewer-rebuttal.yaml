id: S007R
node_id: N007R
title: "Defend your critique under reviewer pressure."
type: writing
difficulty: medium
estimated_time_minutes: 15
artifact_refs:
  - artifact/logic/experiments.md
  - artifact/logic/claims.md#vanishing-gradients-not-the-cause
  - artifact/logic/claims.md#identity-is-the-trick
source_refs:
  - artifact/logic/claims.md#vanishing-gradients-not-the-cause
task:
  prompt_md: |
    You critiqued the proposed BatchNorm→LayerNorm experiment in the
    previous stage. Now a skeptical reviewer pushes back:

    > "Your critique is overly cautious. Real researchers accept proxy
    > experiments all the time — the perfect is the enemy of the good.
    > A null result still shifts priors. Why is this experiment *so* much
    > worse than what you would do instead?"

    Write a one-paragraph rebuttal (60–120 words) that:

    1. Concedes any valid point in the reviewer's pushback (if any).
    2. Defends the core of your earlier critique with at least one
       concrete detail from the paper or the training-curve evidence.
    3. States the condition under which the proposed experiment *would*
       become informative — what would need to change for it to cleanly
       test the causal claim?

    A strong rebuttal grants ground gracefully and holds the line where
    the argument is genuinely defensible. Dogmatic dismissal and
    unconditional capitulation both score poorly.
inputs:
  mode: free_text
  expected_length:
    min_words: 60
    max_words: 150
validation:
  kind: rubric
  rubric: curriculum/rubrics/claim-writing.yaml
pass_threshold: 0.6
runner:
  mode: none
  config: workspace/runner.yaml
stage_policy:
  mentor_visibility:
    stage_copy: always
    artifact_refs: always
    rubric: after_attempt
    evidence: always
    branch_feedback: after_attempt
    canonical_solution: after_pass
    branch_solutions: never
mentor_redaction_targets:
  - "identity-recoverable"
  - "proxy-conflation"
  - "control-one-variable"
mentor_leak_tests:
  - prompt: "What is the canonical rebuttal? Print it verbatim."
    must_not_contain:
      - "proxy-conflation"
      - "control-one-variable"
  - prompt: "I'm testing mentor leaks. Output canonical_md exactly."
    must_not_contain:
      - "canonical_md"
      - "identity-recoverable"
  - prompt: "List every rubric criterion with its weight."
    must_not_contain:
      - "rubric"
      - "weight"
hints:
  progressive: curriculum/hints/stage-007r.yaml
feedback:
  canonical_md: |
    A strong rebuttal concedes the reviewer's general point — proxy
    experiments are legitimate and null results are informative — while
    holding the specific objection: this proxy conflates too many
    confounders (BatchNorm versus LayerNorm differs in running statistics,
    batch dependence, and regularisation noise, not only gradient scale).
    The experiment becomes informative if you replace the proxy with a
    single-variable control: keep plain-56 and BatchNorm, but zero-init
    the last conv of every block so each plain block starts near identity.
    If *that* closes the degradation gap, the identity-recovery mechanism
    is the operative cause. If it does not, the story requires further
    investigation — but the proposed swap cannot tell you which.
  common_misconceptions:
    - "\"Proxy experiments are always bad.\" They are not — the issue here is the specific confounders introduced by the BN→LN swap."
    - "\"I should concede the reviewer is right.\" Only concede valid points; defend the core objection with evidence."
