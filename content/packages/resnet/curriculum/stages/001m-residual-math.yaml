id: S001M
node_id: N001M
title: "The math behind identity mapping."
type: math
stage_subtype: derivation_scaffold
difficulty: easy
estimated_time_minutes: 10
artifact_refs:
  - artifact/logic/concepts.md
  - artifact/logic/claims.md#identity-is-the-trick
  - artifact/logic/solution/algorithm.md
source_refs:
  - artifact/logic/claims.md#identity-is-the-trick
  - artifact/logic/solution/algorithm.md
evidence_refs:
  - artifact/logic/claims.md#identity-is-the-trick
  - artifact/logic/solution/algorithm.md
task:
  prompt_md: |
    Complete the residual derivation before you implement the shortcut path.

    The paper writes the desired block mapping as $H(x)$ and the learned
    residual branch as $F(x)$, with $H(x)=F(x)+x$. Fill the scaffolded steps:

    1. If the target mapping is identity, $H(x)=x$, solve for the residual
       branch target.
    2. Differentiate $H(x)=F(x)+x$ with respect to $x$ and identify the
       shortcut term that remains in the gradient.
    3. Repair the wrong mechanism claim: "Residual learning solves vanishing
       gradients." State the narrower mechanism the derivation actually
       supports.

    Use the result in `S003`: the shortcut path can only add back `x` when
    its shape matches the residual branch output, so shape preservation is not
    an implementation detail; it is required by the equation.
inputs:
  mode: mixed_math
  answer_schema:
    kind: mixed_math
    final_explanation: true
    steps:
      - id: identity-target
        label: "Identity target"
        kind: symbolic_step
        prompt_md: "Given $H(x)=F(x)+x$ and $H(x)=x$, fill in the target for $F(x)$."
        blank_latex: "F(x)=\\_"
        accepted_equivalent_forms:
          - "F(x)=0"
          - "F=0"
          - "0"
        hint_md: "Substitute $H(x)=x$ into $H(x)=F(x)+x$, then subtract $x$ from both sides."
        feedback_md: "The residual branch can represent identity by learning the zero residual."
        artifact_refs:
          - artifact/logic/claims.md#identity-is-the-trick
        evidence_refs:
          - artifact/logic/solution/algorithm.md
      - id: gradient-shortcut
        label: "Shortcut gradient"
        kind: symbolic_step
        prompt_md: "Differentiate $H(x)=F(x)+x$ with respect to $x$."
        blank_latex: "\\frac{dH}{dx}=\\_"
        accepted_equivalent_forms:
          - "\\frac{dF}{dx}+1"
          - "1+\\frac{dF}{dx}"
          - "\\frac{dF(x)}{dx}+1"
        hint_md: "Use linearity of differentiation and remember that $d(x)/dx=1$."
        feedback_md: "The additive identity path contributes a direct unit-gradient term."
        artifact_refs:
          - artifact/logic/solution/algorithm.md
        evidence_refs:
          - artifact/logic/claims.md#identity-is-the-trick
      - id: repair-overclaim
        label: "Repair the mechanism claim"
        kind: proof_critique
        prompt_md: "Mark the claim 'residual learning solves vanishing gradients' as invalid or under-specified, then repair it using the derivation."
        allowed_assumptions:
          - "BatchNorm and initialization already help signal scale."
          - "The derivation supports identity-recoverable optimization, not a complete causal proof about vanishing gradients."
        hint_md: "The $+1$ term explains a shortcut path for signal, but the paper's degradation result is broader than a pure vanishing-gradient diagnosis."
        feedback_md: "A careful repair says residual blocks make identity mappings easy to represent and optimize; they do not by themselves prove vanishing gradients are solved."
        artifact_refs:
          - artifact/logic/claims.md#vanishing-gradients-not-the-cause
          - artifact/logic/claims.md#identity-is-the-trick
        evidence_refs:
          - artifact/logic/claims.md#identity-is-the-trick
  allowed_symbols:
    - "H"
    - "F"
    - "x"
    - "+"
    - "1"
    - "0"
    - "\\frac{d}{dx}"
  shape_variables:
    x: "Input tensor shape that the shortcut path must preserve unless projected."
    "F(x)": "Residual branch output shape; must match the shortcut output before addition."
    "H(x)": "Block output shape after residual addition."
  accepted_equivalent_forms:
    identity-target:
      - "F(x)=0"
      - "F=0"
      - "0"
    gradient-shortcut:
      - "\\frac{dF}{dx}+1"
      - "1+\\frac{dF}{dx}"
      - "\\frac{dF(x)}{dx}+1"
  per_step_hints:
    identity-target: "Cancel the $x$ term on both sides."
    gradient-shortcut: "Differentiate the residual branch and the identity shortcut separately."
    repair-overclaim: "Replace the causal overclaim with the identity-recovery mechanism."
  per_step_feedback:
    identity-target: "Identity is recovered when the residual branch learns zero."
    gradient-shortcut: "The direct shortcut contributes the unit-gradient term."
    repair-overclaim: "The derivation supports easier identity optimization, not a blanket vanishing-gradient cure."
  # Symbol-palette config (promoted from experiment M1 — see
  # `archive/m1-symbol-palette/README.md`). When present,
  # the math stage view renders a click-to-assemble palette in place of the
  # raw LaTeX input for the blank derivation step.
  palette:
    categoryOrder: ["differentials", "variables", "operators", "numbers", "bonus"]
    categoryLabels:
      differentials: "Differentials"
      variables: "Variables"
      operators: "Operators"
      numbers: "Numbers"
      bonus: "More symbols"
    tiles:
      - id: dH-dx
        label: "$\\frac{dH}{dx}$"
        latex: "\\frac{dH}{dx}"
        category: "differentials"
        gloss:
          name: "Derivative of H w.r.t. x"
          plainEnglish: "How much H changes when x changes by a tiny amount. The slope of H seen as a function of x."
          appearsIn: "artifact/logic/solution/algorithm.md"
      - id: dF-dx
        label: "$\\frac{dF}{dx}$"
        latex: "\\frac{dF}{dx}"
        category: "differentials"
        gloss:
          name: "Derivative of F w.r.t. x"
          plainEnglish: "How much the learned residual F changes when x changes. This is the part the network has to actually optimise."
          appearsIn: "artifact/logic/solution/algorithm.md"
      - id: H
        label: "$H$"
        latex: "H"
        category: "variables"
        gloss:
          name: "H — the target mapping"
          plainEnglish: "The function a stack of layers ideally implements. The paper writes it H(x)."
          appearsIn: "artifact/logic/claims.md#identity-is-the-trick"
      - id: F
        label: "$F$"
        latex: "F"
        category: "variables"
        gloss:
          name: "F — the residual mapping"
          plainEnglish: "What the stack of layers actually learns, on top of the identity shortcut."
          appearsIn: "artifact/logic/claims.md#identity-is-the-trick"
      - id: x
        label: "$x$"
        latex: "x"
        category: "variables"
        gloss:
          name: "x — the block input"
          plainEnglish: "The input fed into the residual block."
      - id: eq
        label: "$=$"
        latex: " = "
        category: "operators"
        gloss:
          name: "Equals"
          plainEnglish: "The two sides are the same quantity."
      - id: plus
        label: "$+$"
        latex: " + "
        category: "operators"
        gloss:
          name: "Plus"
          plainEnglish: "Add the two quantities together."
      - id: minus
        label: "$-$"
        latex: " - "
        category: "operators"
        gloss:
          name: "Minus"
          plainEnglish: "Subtract the second from the first."
      - id: one
        label: "$1$"
        latex: "1"
        category: "numbers"
        gloss:
          name: "The number 1"
          plainEnglish: "Appears as the derivative of the identity shortcut: d(x)/dx = 1. It's why deep residual stacks preserve gradient signal."
          appearsIn: "artifact/logic/claims.md#identity-is-the-trick"
      - id: zero
        label: "$0$"
        latex: "0"
        category: "numbers"
        gloss:
          name: "The number 0"
          plainEnglish: "Useful when expressing the identity case: if F = 0, then H = x."
      - id: partial
        label: "$\\partial$"
        latex: "\\partial"
        category: "bonus"
        gloss:
          name: "Partial derivative"
          plainEnglish: "Like d/dx, but used when the function has many inputs and you want the slope along just one axis."
      - id: nabla
