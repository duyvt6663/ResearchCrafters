runner:
  mode: none
pass_threshold: 0.7
hints:
  progressive: curriculum/hints/stage-001m.yaml
feedback:
  canonical_md: |
    Identity-as-default. If the optimal $H(x) = x$, then $F(x) = 0$ is the
    target. Driving the weights of `F` toward zero is far easier than
    learning identity through a nonlinear stack — this is the optimisation
    reason residual blocks help.

    The gradient $dH/dx = dF/dx + 1$. The `+1` survives backprop through
    every block, so deep stacks still propagate signal through the
    shortcut even when `dF/dx` is small.

    When $H(x) ≠ x$, the residual reparameterisation still lets the layers
    treat identity as a baseline and learn the *difference* — usually a
    smaller perturbation than the full mapping.
  common_misconceptions:
    - "Residual learning solves vanishing gradients."
    - "Skip connections add capacity to the network."
