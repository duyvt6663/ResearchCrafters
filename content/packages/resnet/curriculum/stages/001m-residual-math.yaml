id: S001M
node_id: N001M
title: "The math behind identity mapping."
type: math
difficulty: easy
estimated_time_minutes: 10
artifact_refs:
  - artifact/logic/concepts.md
  - artifact/logic/claims.md#identity-is-the-trick
  - artifact/logic/solution/algorithm.md
source_refs:
  - artifact/logic/claims.md#identity-is-the-trick
  - artifact/logic/solution/algorithm.md
task:
  prompt_md: |
    Before you commit to a fix, work through the math that motivates the
    residual decision.

    Let $H(x)$ be the function a stack of layers ideally implements. A
    residual block reformulates this as $H(x) = F(x) + x$, where $F(x)$ is
    what the stack of layers actually learns and $+ x$ is an identity
    shortcut.

    Answer in your own words:

    1. Suppose the optimal $H(x)$ for a particular block is exactly the
       identity function. What does $F(x)$ need to be? Why is that easier
       to optimise than learning identity from scratch through a non-linear
       stack?
    2. Show, with one or two lines of differentiation, why the gradient of
       a residual block w.r.t. `x` always contains a `1 +` term. Explain
       in one sentence why this matters when stacking many blocks.
    3. The paper claims residual learning helps even when the optimal
       mapping is *not* identity. Briefly: why?

    A correct answer is short. Your write-up should be ≤ 8 sentences.
