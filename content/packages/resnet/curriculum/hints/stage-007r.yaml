id: hints-stage-007r
stage_id: S007R
levels:
  - level: 1
    title: "Concede the valid point"
    body_md: |
      The reviewer is not entirely wrong: shortcut paths can improve gradient
      flow. Concede that in one sentence before narrowing the claim to what
      the evidence actually supports.
  - level: 2
    title: "Name the narrower mechanism"
    body_md: |
      Use the residual derivation: identity mappings become easy to recover,
      and the training curves show degradation is reduced. That is narrower
      than saying the architecture solves all vanishing-gradient behavior.
  - level: 3
    title: "Ask for the isolating experiment"
    body_md: |
      End constructively: to isolate the vanishing-gradient mechanism, the
      experiment would need gradient-flow measurements or controls while
      holding depth, normalization, initialization, and optimizer fixed.
