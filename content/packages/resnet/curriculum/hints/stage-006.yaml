id: hints-stage-006
stage_id: S006
levels:
  - level: 1
    title: "Separate overclaim from mechanism"
    body_md: |
      Start by crossing out the unsupported parts of the draft: "solves
      vanishing gradients" and "always". Keep the mechanism you can defend:
      residual blocks make an identity-like mapping easy to represent.
  - level: 2
    title: "Build the evidence ladder"
    body_md: |
      Use a concrete path inside the package, then add the warrant and
      limitation. For this stage the central evidence path is
      `artifact/evidence/tables/training-curves.md#plain-vs-residual`,
      not a vague "as shown in the experiments".
  - level: 3
    title: "Avoid the two overclaims"
    body_md: |
      The two most common overclaims are "solves vanishing gradients" and
      "always outperforms plain at every depth". Your evidence supports
      neither — write the claim so it is consistent with what you measured.
