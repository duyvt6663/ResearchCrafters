name: Telegram Notifications

on:
  workflow_run:
    workflows: ['CI', 'Lighthouse']
    types: [completed]
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - closed
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  deployment_status:
  workflow_dispatch:

permissions: {}

jobs:
  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${TELEGRAM_BOT_TOKEN:-}" || -z "${TELEGRAM_CHAT_ID:-}" ]]; then
            echo "::notice::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is not configured; skipping Telegram notification."
            exit 0
          fi

          node <<'NODE'
          const fs = require("fs");

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const eventName = process.env.GITHUB_EVENT_NAME;
          const repo = process.env.GITHUB_REPOSITORY;
          const serverUrl = process.env.GITHUB_SERVER_URL || "https://github.com";
          const runUrl = `${serverUrl}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

          function actor(user) {
            return user && user.login ? `@${user.login}` : "unknown";
          }

          function compact(value, limit = 700) {
            const text = String(value || "")
              .replace(/\r/g, "")
              .trim();
            if (text.length <= limit) {
              return text;
            }
            return `${text.slice(0, limit - 15).trimEnd()}\n[truncated]`;
          }

          function shortSha(value) {
            return value ? String(value).slice(0, 7) : "unknown";
          }

          function titleLine(value) {
            return compact(value, 160) || "(no title)";
          }

          function workflowRunMessage() {
            const run = event.workflow_run || {};
            const conclusion = run.conclusion || run.status || "unknown";
            const workflowName = run.name || "Workflow";
            const label = conclusion === "success" ? "PASSED" : conclusion.toUpperCase();
            const pullRequests = Array.isArray(run.pull_requests) ? run.pull_requests : [];
            const pullRequest = pullRequests[0];
            const lines = [
              `[${workflowName} ${label}] ${repo}`,
              `Branch: ${run.head_branch || "unknown"}`,
              `Commit: ${shortSha(run.head_sha)}`,
              `By: ${actor(run.actor || run.triggering_actor)}`,
            ];

            if (pullRequest) {
              lines.push(`Pull request: #${pullRequest.number}`);
            }

            lines.push(`Run: ${run.html_url || runUrl}`);
            return lines.join("\n");
          }

          function pullRequestMessage() {
            const pr = event.pull_request || {};
            let action = event.action || "updated";
            if (action === "closed" && pr.merged) {
              action = "merged";
            }

            const lines = [
              `[PR ${action}] ${repo} #${pr.number}`,
              titleLine(pr.title),
              `Author: ${actor(pr.user)}`,
              `Base: ${pr.base?.ref || "unknown"} <- Head: ${pr.head?.ref || "unknown"}`,
            ];

            if (action === "synchronize") {
              lines.push(`Commit: ${shortSha(pr.head?.sha || event.after)}`);
            }

            if (pr.draft) {
              lines.push("Draft: yes");
            }

            lines.push(`URL: ${pr.html_url || runUrl}`);
            return lines.join("\n");
          }

          function issueCommentMessage() {
            const issue = event.issue || {};
            const comment = event.comment || {};
            const kind = issue.pull_request ? "PR comment" : "Issue comment";
            const lines = [
              `[${kind}] ${repo} #${issue.number}`,
              titleLine(issue.title),
              `By: ${actor(comment.user)}`,
            ];

            const body = compact(comment.body);
            if (body) {
              lines.push("", body);
            }

            lines.push("", `URL: ${comment.html_url || runUrl}`);
            return lines.join("\n");
          }

          function pullRequestReviewMessage() {
            const pr = event.pull_request || {};
            const review = event.review || {};
            const state = review.state || event.action || "submitted";
            const lines = [
              `[PR review ${state}] ${repo} #${pr.number}`,
              titleLine(pr.title),
              `By: ${actor(review.user)}`,
            ];

            const body = compact(review.body);
            if (body) {
              lines.push("", body);
            }

            lines.push("", `URL: ${review.html_url || pr.html_url || runUrl}`);
            return lines.join("\n");
          }

          function pullRequestReviewCommentMessage() {
            const pr = event.pull_request || {};
            const comment = event.comment || {};
            const location = [comment.path, comment.line || comment.original_line]
              .filter(Boolean)
              .join(":");
            const lines = [
              `[PR code comment] ${repo} #${pr.number}`,
              titleLine(pr.title),
              `By: ${actor(comment.user)}`,
            ];

            if (location) {
              lines.push(`File: ${location}`);
            }

            const body = compact(comment.body);
            if (body) {
              lines.push("", body);
            }

            lines.push("", `URL: ${comment.html_url || runUrl}`);
            return lines.join("\n");
          }

          function deploymentStatusMessage() {
            const deployment = event.deployment || {};
            const status = event.deployment_status || {};
            const lines = [
              `[Deployment ${status.state || "updated"}] ${repo}`,
              `Environment: ${deployment.environment || status.environment || "unknown"}`,
              `Ref: ${deployment.ref || "unknown"}`,
              `By: ${actor(deployment.creator)}`,
            ];

            const description = compact(status.description, 240);
            if (description) {
              lines.push(`Description: ${description}`);
            }

            lines.push(`URL: ${status.target_url || deployment.url || runUrl}`);
            return lines.join("\n");
          }

          function workflowDispatchMessage() {
            return [
              `[Telegram test] ${repo}`,
              `Workflow: ${process.env.GITHUB_WORKFLOW || "Telegram Notifications"}`,
              `Run: ${runUrl}`,
            ].join("\n");
          }

          function defaultMessage() {
            return [
              `[GitHub ${eventName}] ${repo}`,
              `Action: ${event.action || "triggered"}`,
              `Run: ${runUrl}`,
            ].join("\n");
          }

          const builders = {
            workflow_run: workflowRunMessage,
            pull_request_target: pullRequestMessage,
            issue_comment: issueCommentMessage,
            pull_request_review: pullRequestReviewMessage,
            pull_request_review_comment: pullRequestReviewCommentMessage,
            deployment_status: deploymentStatusMessage,
            workflow_dispatch: workflowDispatchMessage,
          };

          async function main() {
            let text = (builders[eventName] || defaultMessage)();
            if (text.length > 3900) {
              text = `${text.slice(0, 3886).trimEnd()}\n[truncated]`;
            }

            const payload = {
              chat_id: process.env.TELEGRAM_CHAT_ID,
              text,
              disable_web_page_preview: true,
            };

            if (process.env.TELEGRAM_THREAD_ID) {
              payload.message_thread_id = Number(process.env.TELEGRAM_THREAD_ID);
            }

            const response = await fetch(
              `https://api.telegram.org/bot${process.env.TELEGRAM_BOT_TOKEN}/sendMessage`,
              {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify(payload),
              },
            );

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Telegram sendMessage failed: ${response.status} ${body}`);
            }

            console.log("Telegram notification sent.");
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Trigger Skynet CI fixer
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' }}
        env:
          GOCLAW_SKYNET_HOOK_URL: ${{ secrets.GOCLAW_SKYNET_HOOK_URL }}
          GOCLAW_SKYNET_HOOK_TOKEN: ${{ secrets.GOCLAW_SKYNET_HOOK_TOKEN }}
          GOCLAW_SKYNET_TARGET_REPO: ${{ secrets.GOCLAW_SKYNET_TARGET_REPO }}
          GOCLAW_SKYNET_CHANNEL: ${{ secrets.GOCLAW_SKYNET_CHANNEL }}
          GOCLAW_SKYNET_CHAT_ID: ${{ secrets.GOCLAW_SKYNET_CHAT_ID }}
          GOCLAW_SKYNET_LOCAL_KEY: ${{ secrets.GOCLAW_SKYNET_LOCAL_KEY }}
          GOCLAW_SKYNET_PEER_KIND: ${{ secrets.GOCLAW_SKYNET_PEER_KIND }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");

          const hookUrl = (process.env.GOCLAW_SKYNET_HOOK_URL || "").trim();
          const hookToken = (process.env.GOCLAW_SKYNET_HOOK_TOKEN || "").trim();

          if (!hookUrl || !hookToken) {
            console.log("::notice::GOCLAW_SKYNET_HOOK_URL or GOCLAW_SKYNET_HOOK_TOKEN is not configured; skipping Skynet CI fixer dispatch.");
            process.exit(0);
          }

          const event = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const run = event.workflow_run || {};
          const conclusion = String(run.conclusion || "").toLowerCase();
          const triggerable = new Set(["failure", "timed_out", "cancelled", "action_required", "startup_failure"]);

          if (!triggerable.has(conclusion)) {
            console.log(`Skipping Skynet CI fixer dispatch for workflow conclusion: ${conclusion || "unknown"}`);
            process.exit(0);
          }

          const repo = process.env.GITHUB_REPOSITORY;
          const serverUrl = process.env.GITHUB_SERVER_URL || "https://github.com";
          const notifyRunUrl = `${serverUrl}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const pullRequests = Array.isArray(run.pull_requests) ? run.pull_requests : [];
          const pullRequest = pullRequests[0];

          function actor(user) {
            return user && user.login ? `@${user.login}` : "unknown";
          }

          function shortSha(value) {
            return value ? String(value).slice(0, 7) : "unknown";
          }

          function endpointFrom(value) {
            const clean = value.replace(/\/+$/, "");
            if (clean.endsWith("/v1/beta/skynet-workflows/cicd-failure")) {
              return clean;
            }
            return `${clean}/v1/beta/skynet-workflows/cicd-failure`;
          }

          const lines = [
            `[${run.name || "Workflow"} ${conclusion.toUpperCase()}] ${repo}`,
            `Branch: ${run.head_branch || "unknown"}`,
            `Commit: ${shortSha(run.head_sha)}`,
            `By: ${actor(run.actor || run.triggering_actor)}`,
          ];

          if (pullRequest) {
            lines.push(`Pull request: #${pullRequest.number}`);
          }

          lines.push(`Run: ${run.html_url || notifyRunUrl}`);
          lines.push("");
          lines.push("Skynet: inspect the failing GitHub Actions run, patch the PR branch, run focused verification, and report the fix.");

          const payload = {
            log: lines.join("\n"),
            repository: repo,
            run_url: run.html_url || notifyRunUrl,
            pull_request: pullRequest ? `#${pullRequest.number}` : "",
            branch: run.head_branch || "",
            commit: run.head_sha || "",
            author: actor(run.actor || run.triggering_actor),
          };

          for (const [envName, key] of [
            ["GOCLAW_SKYNET_TARGET_REPO", "target_repo"],
            ["GOCLAW_SKYNET_CHANNEL", "channel"],
            ["GOCLAW_SKYNET_CHAT_ID", "chat_id"],
            ["GOCLAW_SKYNET_LOCAL_KEY", "local_key"],
            ["GOCLAW_SKYNET_PEER_KIND", "peer_kind"],
          ]) {
            const value = (process.env[envName] || "").trim();
            if (value) {
              payload[key] = value;
            }
          }

          async function main() {
            const response = await fetch(endpointFrom(hookUrl), {
              method: "POST",
              headers: {
                "authorization": `Bearer ${hookToken}`,
                "content-type": "application/json",
              },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              const body = await response.text();
              throw new Error(`Skynet CI fixer dispatch failed: ${response.status} ${body}`);
            }

            console.log("Skynet CI fixer dispatched.");
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
