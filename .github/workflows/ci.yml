name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The browser smoke suite renders live Prisma-backed pages. Keep the service
# boot, env, migration, and seed path shared with Lighthouse through
# `.github/actions/prepare-integration-env`.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare integration environment
        uses: ./.github/actions/prepare-integration-env
        with:
          port: '3000'

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Playwright e2e smoke tests run against the Next.js dev server defined
      # in `playwright.config.ts`; the integration environment above supplies
      # the database, auth secret, S3 emulator, migrations, and seeded content.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm test:e2e

      - name: Stop integration services
        if: always()
        shell: bash
        run: docker compose down

      - name: Validate ERP packages
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          failed=0
          dirs=(content/packages/*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No packages found under content/packages/"
            exit 0
          fi
          for dir in "${dirs[@]}"; do
            dir="${dir%/}"
            echo "::group::validate $dir"
            if ! pnpm --filter @researchcrafters/cli exec node ./bin/researchcrafters.js validate "$(realpath "$dir")"; then
              echo "::error::validate failed for $dir"
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
