name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: this workflow does not stand up Postgres / Redis / S3. The current
# test suite uses mocks and stubs (see backlog/PROGRESS.md). Integration tests
# that need live services will be added in a follow-up workflow that wires
# `services:` (or `docker compose`) before the test step.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Match docker-compose.yml defaults so Next.js dev server and Prisma
      # both connect to the Postgres service started below.
      DATABASE_URL: postgresql://researchcrafters:researchcrafters@localhost:5432/researchcrafters
      NEXTAUTH_SECRET: ci-validate-secret
      NEXTAUTH_URL: http://localhost:3000
      RUNNER_DOCKER_ENABLED: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Boot Postgres
        shell: bash
        run: docker compose up -d postgres

      - name: Wait for Postgres healthy
        shell: bash
        run: |
          set -euo pipefail
          tries=40
          while (( tries > 0 )); do
            if docker compose exec -T postgres pg_isready -U researchcrafters -d researchcrafters >/dev/null 2>&1; then
              echo "postgres is ready"
              exit 0
            fi
            sleep 2
            tries=$((tries - 1))
          done
          echo "postgres did not become ready in time"
          docker compose logs postgres
          exit 1


      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @researchcrafters/db exec prisma generate

      - name: Apply Prisma migrations
        run: pnpm --filter @researchcrafters/db exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter @researchcrafters/db db:seed


      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Playwright e2e smoke tests run against the Next.js dev server.
      # Postgres is wired above; the dev server picks up DATABASE_URL from
      # the job env so Prisma routes respond correctly.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm test:e2e

      - name: Validate ERP packages
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          failed=0
          dirs=(content/packages/*/)
          if [ ${#dirs[@]} -eq 0 ]; then
            echo "No packages found under content/packages/"
            exit 0
          fi
          for dir in "${dirs[@]}"; do
            dir="${dir%/}"
            echo "::group::validate $dir"
            if ! pnpm --filter @researchcrafters/cli exec node ./bin/researchcrafters.js validate "$(realpath "$dir")"; then
              echo "::error::validate failed for $dir"
              failed=1
            fi
            echo "::endgroup::"
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
