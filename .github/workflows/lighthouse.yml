name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Run independently from the `validate` job in ci.yml so PR feedback isn't
# blocked on Lighthouse, and so the Lighthouse job can spin up its backing
# services without bloating the validate-job runtime.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare integration environment
        uses: ./.github/actions/prepare-integration-env
        with:
          # `next start` honors PORT; use 3001 to avoid colliding with any
          # `next dev` running on 3000 inside the same workflow.
          port: '3001'

      - name: Build web app
        run: pnpm --filter @researchcrafters/web build

      - name: Start web app
        shell: bash
        run: |
          set -euo pipefail
          # `next start` reads PORT from the env (set above to 3001).
          pnpm --filter @researchcrafters/web start > "$RUNNER_TEMP/web.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/web.pid"
          # Poll /api/health until 200 or 60s elapsed.
          tries=30
          while (( tries > 0 )); do
            if curl -fsS "http://localhost:${PORT}/api/health" >/dev/null 2>&1; then
              echo "web app is responding on :${PORT}"
              exit 0
            fi
            sleep 2
            tries=$((tries - 1))
          done
          echo "web app did not respond on :${PORT} within timeout"
          echo "--- web.log ---"
          cat "$RUNNER_TEMP/web.log" || true
          exit 1

      # We rely on the Chromium that lhci downloads via `puppeteer` rather than
      # bundling Playwright's. lhci's Chromium is ~1 download per CI run and
      # avoids the larger Playwright install footprint; if a future change
      # needs Playwright + Lighthouse together, swap to
      # `pnpm exec playwright install chromium` here.

      - name: Pre-warm pages before Lighthouse
        shell: bash
        run: |
          urls=(
            "http://localhost:${PORT}/"
            "http://localhost:${PORT}/packages/resnet"
          )
          for url in "${urls[@]}"; do
            status=$(curl -fsS -o /dev/null -w "%{http_code}" "$url" || echo "000")
            echo "warmup $url -> $status"
          done

      - name: Run Lighthouse CI
        run: npx -y @lhci/cli@0.14.x autorun

      - name: Stop web app
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$RUNNER_TEMP/web.pid" ]; then
            pid="$(cat "$RUNNER_TEMP/web.pid")"
            kill "$pid" 2>/dev/null || true
          fi

      - name: Stop integration services
        if: always()
        shell: bash
        run: docker compose down

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.sha }}
          path: .lighthouseci/**
          if-no-files-found: warn
          retention-days: 14
