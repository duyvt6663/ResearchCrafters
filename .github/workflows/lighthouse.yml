name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Run independently from the `validate` job in ci.yml so PR feedback isn't
# blocked on Lighthouse, and so the Lighthouse job can spin up Postgres + MinIO
# without bloating the validate-job runtime.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Match docker-compose.yml + .env.example so the Next.js app and Prisma
      # client both target the dev tier brought up below.
      DATABASE_URL: postgresql://researchcrafters:researchcrafters@localhost:5432/researchcrafters?schema=public
      REDIS_URL: redis://localhost:6379
      RUNNER_CALLBACK_SECRET: dev-runner-secret
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: researchcrafters
      S3_SECRET_KEY: researchcrafters
      S3_BUCKET_SUBMISSIONS: researchcrafters-submissions
      S3_BUCKET_RUNS: researchcrafters-runs
      S3_BUCKET_PACKAGES: researchcrafters-packages
      S3_BUCKET_SHARE_CARDS: researchcrafters-share-cards
      RESEARCHCRAFTERS_API_URL: http://localhost:3001
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: lighthouse-ci-non-secret-placeholder
      RUNNER_DOCKER_ENABLED: 'false'
      # `next start` honors PORT; we use 3001 to avoid colliding with any
      # `next dev` running on 3000 inside the same workflow.
      PORT: '3001'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Boot Postgres + MinIO only. The Lighthouse perf check renders public
      # pages via Prisma; it does not need Redis / BullMQ workers, and the
      # Redis port-conflict gap is tracked separately in PROGRESS.md.
      - name: Boot Postgres + MinIO
        shell: bash
        run: docker compose up -d postgres minio

      - name: Wait for Postgres healthy
        shell: bash
        run: |
          set -euo pipefail
          tries=40
          while (( tries > 0 )); do
            if docker compose exec -T postgres pg_isready -U researchcrafters -d researchcrafters >/dev/null 2>&1; then
              echo "postgres is ready"
              exit 0
            fi
            sleep 2
            tries=$((tries - 1))
          done
          echo "postgres did not become ready in time"
          docker compose logs postgres
          exit 1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @researchcrafters/db exec prisma generate

      - name: Apply Prisma migrations
        run: pnpm --filter @researchcrafters/db exec prisma migrate deploy

      - name: Seed database
        run: pnpm --filter @researchcrafters/db db:seed

      - name: Build web app
        run: pnpm --filter @researchcrafters/web build

      - name: Start web app
        shell: bash
        run: |
          set -euo pipefail
          # `next start` reads PORT from the env (set above to 3001).
          pnpm --filter @researchcrafters/web start > "$RUNNER_TEMP/web.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/web.pid"
          # Poll /api/health until 200 or 60s elapsed.
          tries=30
          while (( tries > 0 )); do
            if curl -fsS http://localhost:3001/api/health >/dev/null 2>&1; then
              echo "web app is responding on :3001"
              exit 0
            fi
            sleep 2
            tries=$((tries - 1))
          done
          echo "web app did not respond on :3001 within timeout"
          echo "--- web.log ---"
          cat "$RUNNER_TEMP/web.log" || true
          exit 1

      # We rely on the Chromium that lhci downloads via `puppeteer` rather than
      # bundling Playwright's. lhci's Chromium is ~1 download per CI run and
      # avoids the larger Playwright install footprint; if a future change
      # needs Playwright + Lighthouse together, swap to
      # `pnpm exec playwright install chromium` here.
      - name: Run Lighthouse CI
        run: npx -y @lhci/cli@0.14.x autorun

      - name: Stop web app
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$RUNNER_TEMP/web.pid" ]; then
            pid="$(cat "$RUNNER_TEMP/web.pid")"
            kill "$pid" 2>/dev/null || true
          fi

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.sha }}
          path: .lighthouseci/**
          if-no-files-found: warn
          retention-days: 14
